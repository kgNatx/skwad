<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>SKWAD Usage</title>
  <link rel="icon" type="image/svg+xml" href="/skwad-icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header img {
      width: 36px;
      height: 36px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header p {
      color: #888;
      font-size: 13px;
      text-align: right;
      text-wrap: balance;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #4ade80;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 6px;
      font-weight: 600;
    }

    .section {
      max-width: 800px;
      margin: 0 auto 28px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      color: #ccc;
    }

    #map {
      height: 350px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
    }

    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      width: 100px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      color: #ccc;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 28px;
      background: #1a1a1a;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      min-width: 2px;
      transition: width 0.5s ease;
    }

    .bar-count {
      width: 50px;
      font-size: 14px;
      font-weight: 700;
      color: #888;
      flex-shrink: 0;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .feature-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
    }

    .feature-pct {
      font-size: 28px;
      font-weight: 800;
      color: #fbbf24;
    }

    .feature-label {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      color: #555;
      padding: 60px 20px;
      font-size: 18px;
      font-weight: 700;
    }

    .loading {
      text-align: center;
      color: #555;
      padding: 60px 20px;
      font-size: 16px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      padding-bottom: 40px;
    }

    .back-link a {
      color: #4ade80;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    /* Leaflet popup styling for dark theme */
    .leaflet-popup-content-wrapper {
      background: #1a1a1a;
      color: #fff;
      border-radius: 8px;
      font-family: inherit;
    }
    .leaflet-popup-tip {
      background: #1a1a1a;
    }
    .leaflet-popup-content {
      margin: 10px 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .map-legend {
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .map-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .map-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .map-legend-dot.active {
      background: #fbbf24;
      box-shadow: 0 0 6px rgba(251, 191, 36, 0.6);
    }
    .map-legend-dot.past {
      background: #4ade80;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .pulse-marker {
      border-radius: 50%;
      animation: pulse-ring 2s ease-out infinite;
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .stat-value { font-size: 26px; }
      .bar-label { width: 80px; font-size: 12px; }
      #map { height: 280px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="/skwad-icon.svg" alt="SKWAD">
    <h1 data-i18n="USAGE_TITLE">Usage</h1>
  </div>
  <p data-i18n="USAGE_SUBTITLE">Aggregate stats from all Skwad sessions</p>
</div>

<div id="loading" class="loading" data-i18n="USAGE_LOADING">Loading...</div>
<div id="empty" class="empty-state" style="display:none" data-i18n="USAGE_EMPTY">No sessions recorded yet. Stats will appear after the first session expires.</div>
<div id="content" style="display:none">

  <div class="stats-grid" id="stats-grid"></div>

  <div class="section" id="map-section">
    <div class="section-title" data-i18n="USAGE_MAP_TITLE">Sessions Around the World</div>
    <div id="map"></div>
  </div>

  <div class="section" id="vs-section">
    <div class="section-title" data-i18n="USAGE_VS_TITLE">Video Systems</div>
    <div class="bar-chart" id="vs-chart"></div>
  </div>

  <div class="section" id="feature-section">
    <div class="section-title" data-i18n="USAGE_FEATURE_TITLE">Feature Adoption</div>
    <div class="feature-grid" id="feature-grid"></div>
  </div>

</div>

<div class="back-link"><a href="/" data-i18n="USAGE_BACK">Back to Skwad</a></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/i18n.js"></script>
<script>
(function() {
  const VIDEO_SYSTEM_NAMES = {
    analog: 'Analog',
    dji_v1: 'DJI V1',
    dji_o3: 'DJI O3',
    dji_o4: 'DJI O4',
    hdzero: 'HDZero',
    walksnail: 'Walksnail',
    openipc: 'OpenIPC'
  };

  const BAR_COLORS = [
    '#4ade80', '#fbbf24', '#f87171', '#60a5fa',
    '#c084fc', '#fb923c', '#22d3ee'
  ];

  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  function fmtDuration(minutes) {
    const h = Math.floor(minutes / 60);
    const m = Math.round(minutes % 60);
    if (h === 0) return m + 'm';
    return h + 'h ' + m + 'm';
  }

  function addStatCard(parent, value, label) {
    const card = el('div', 'stat-card');
    const valEl = el('div', 'stat-value');
    valEl.textContent = value;
    const labEl = el('div', 'stat-label');
    labEl.textContent = label;
    card.appendChild(valEl);
    card.appendChild(labEl);
    parent.appendChild(card);
  }

  function addBarRow(parent, name, count, maxCount, color) {
    const row = el('div', 'bar-row');

    const label = el('div', 'bar-label');
    label.textContent = name;
    row.appendChild(label);

    const track = el('div', 'bar-track');
    const fill = el('div', 'bar-fill');
    fill.style.width = (count / maxCount * 100) + '%';
    fill.style.background = color;
    track.appendChild(fill);
    row.appendChild(track);

    const countEl = el('div', 'bar-count');
    countEl.textContent = count;
    row.appendChild(countEl);

    parent.appendChild(row);
  }

  function addFeatureCard(parent, value, label) {
    const card = el('div', 'feature-card');
    const pctEl = el('div', 'feature-pct');
    pctEl.textContent = value;
    const labEl = el('div', 'feature-label');
    labEl.textContent = label;
    card.appendChild(pctEl);
    card.appendChild(labEl);
    parent.appendChild(card);
  }

  async function load() {
    const loadingEl = document.getElementById('loading');
    const emptyEl = document.getElementById('empty');
    const contentEl = document.getElementById('content');

    try {
      const resp = await fetch('/api/usage');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      loadingEl.style.display = 'none';

      if (data.total_sessions === 0) {
        emptyEl.style.display = '';
        return;
      }

      contentEl.style.display = '';

      // Stat cards
      const grid = document.getElementById('stats-grid');
      addStatCard(grid, data.total_sessions, t('STAT_SESSIONS'));
      addStatCard(grid, data.total_pilots_joined, t('STAT_PILOTS_JOINED'));
      addStatCard(grid, data.avg_pilots_per_session.toFixed(1), t('STAT_AVG_PER_SESSION'));
      addStatCard(grid, data.peak_session_size, t('STAT_LARGEST_SESSION'));
      addStatCard(grid, fmtDuration(data.avg_session_duration_minutes), t('STAT_AVG_DURATION'));

      // Map
      var hasLocations = data.locations && data.locations.length > 0;
      var hasActive = data.active_locations && data.active_locations.length > 0;

      if (hasLocations || hasActive) {
        const map = L.map('map', { scrollWheelZoom: true });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '\u00a9 CARTO',
          subdomains: 'abcd',
          maxZoom: 19
        }).addTo(map);

        const markers = [];
        const allLocs = (data.locations || []).concat(data.active_locations || []);
        const maxCount = Math.max.apply(null, allLocs.map(function(l) { return l.count; }).concat([1]));

        function locPopup(loc, label) {
          var div = document.createElement('div');
          var strong = document.createElement('strong');
          var locName = loc.city || '';
          if (loc.region) locName += ', ' + loc.region;
          if (loc.country) locName += ' ' + loc.country;
          strong.textContent = locName;
          div.appendChild(strong);
          div.appendChild(document.createElement('br'));
          div.appendChild(document.createTextNode(
            tPlural(label, loc.count)
          ));
          return div;
        }

        // Past session dots — green with glow
        (data.locations || []).forEach(function(loc) {
          var r = Math.max(6, Math.min(20, (loc.count / maxCount) * 20));

          // Outer glow
          L.circleMarker([loc.lat, loc.lng], {
            radius: r + 4,
            fillColor: '#4ade80',
            fillOpacity: 0.15,
            stroke: false,
            interactive: false
          }).addTo(map);

          // Main dot
          var marker = L.circleMarker([loc.lat, loc.lng], {
            radius: r,
            fillColor: '#4ade80',
            color: 'rgba(74, 222, 128, 0.4)',
            weight: 2,
            fillOpacity: 0.7
          }).addTo(map);
          marker.bindPopup(locPopup(loc, 'MAP_SESSION'));
          markers.push(marker);
        });

        // Active session dots — amber with animated pulse
        (data.active_locations || []).forEach(function(loc) {
          var r = Math.max(6, Math.min(20, (loc.count / maxCount) * 20));

          // Animated pulse ring via divIcon
          var pulseSize = (r + 8) * 2;
          var pulseDiv = document.createElement('div');
          pulseDiv.className = 'pulse-marker';
          pulseDiv.style.width = pulseSize + 'px';
          pulseDiv.style.height = pulseSize + 'px';
          pulseDiv.style.background = 'rgba(251,191,36,0.3)';
          var pulseIcon = L.divIcon({
            className: '',
            iconSize: [pulseSize, pulseSize],
            iconAnchor: [pulseSize / 2, pulseSize / 2],
            html: pulseDiv.outerHTML
          });
          L.marker([loc.lat, loc.lng], { icon: pulseIcon, interactive: false }).addTo(map);

          // Outer glow
          L.circleMarker([loc.lat, loc.lng], {
            radius: r + 4,
            fillColor: '#fbbf24',
            fillOpacity: 0.2,
            stroke: false,
            interactive: false
          }).addTo(map);

          // Main dot
          var marker = L.circleMarker([loc.lat, loc.lng], {
            radius: r,
            fillColor: '#fbbf24',
            color: 'rgba(251, 191, 36, 0.5)',
            weight: 2,
            fillOpacity: 0.9
          }).addTo(map);
          marker.bindPopup(locPopup(loc, 'MAP_ACTIVE'));
          markers.push(marker);
        });

        // Legend control
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
          var container = document.createElement('div');
          container.className = 'map-legend';

          if (hasActive) {
            var activeItem = document.createElement('div');
            activeItem.className = 'map-legend-item';
            var activeDot = document.createElement('div');
            activeDot.className = 'map-legend-dot active';
            activeItem.appendChild(activeDot);
            activeItem.appendChild(document.createTextNode(' ' + t('MAP_LEGEND_ACTIVE')));
            container.appendChild(activeItem);
          }

          var pastItem = document.createElement('div');
          pastItem.className = 'map-legend-item';
          var pastDot = document.createElement('div');
          pastDot.className = 'map-legend-dot past';
          pastItem.appendChild(pastDot);
          pastItem.appendChild(document.createTextNode(' ' + t('MAP_LEGEND_PAST')));
          container.appendChild(pastItem);

          return container;
        };
        legend.addTo(map);

        var group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.3));
      } else {
        document.getElementById('map-section').style.display = 'none';
      }

      // Video system bars
      const vs = data.video_system_breakdown || {};
      const vsEntries = Object.entries(vs).sort(function(a, b) { return b[1] - a[1]; });
      if (vsEntries.length > 0) {
        const maxVS = vsEntries[0][1];
        const chart = document.getElementById('vs-chart');
        vsEntries.forEach(function(entry, i) {
          const name = VIDEO_SYSTEM_NAMES[entry[0]] || entry[0];
          addBarRow(chart, name, entry[1], maxVS, BAR_COLORS[i % BAR_COLORS.length]);
        });
      } else {
        document.getElementById('vs-section').style.display = 'none';
      }

      // Feature adoption
      const featureGrid = document.getElementById('feature-grid');
      addFeatureCard(featureGrid, data.sessions_with_power_ceiling_pct.toFixed(0) + '%', t('FEAT_POWER_CEILING'));
      addFeatureCard(featureGrid, data.sessions_with_fixed_channels_pct.toFixed(0) + '%', t('FEAT_FIXED_CHANNELS'));

      if (data.total_sessions > 0 && data.total_rebalances > 0) {
        addFeatureCard(featureGrid,
          (data.total_rebalances / data.total_sessions * 100).toFixed(0) + '%',
          t('FEAT_REBALANCE_RATE'));
      }

      if (data.total_sessions > 0 && data.total_channel_changes > 0) {
        addFeatureCard(featureGrid,
          (data.total_channel_changes / data.total_sessions).toFixed(1),
          t('FEAT_AVG_CHANNEL_CHANGES'));
      }

    } catch (err) {
      loadingEl.textContent = t('USAGE_LOAD_ERROR');
      console.error('Usage fetch error:', err);
    }
  }

  load();
})();
</script>
</body>
</html>
